# docker-compose.prod.yml — Stack completa para produção (VPS)
#
# Uso:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Variáveis necessárias no .env da raiz:
#   POSTGRES_PASSWORD, EVOLUTION_API_KEY, GEMINI_API_KEY,
#   NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY,
#   SUPABASE_SERVICE_ROLE_KEY

services:

  # ─── Infraestrutura ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:15
    container_name: postgres
    command: ["postgres", "-c", "max_connections=200"]
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      # Mapeado para o host — garante que o backup da Hostinger cobre os dados
      - /opt/pyra/dados/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saas_net

  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    volumes:
      - /opt/pyra/dados/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - saas_net

  # ─── Evolution API (WhatsApp) ─────────────────────────────────────────────────

  evolution_api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution_api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      SERVER_URL: https://api.pyralabs.com.br/evolution
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/evolution?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/1
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: "false"
      CACHE_LOCAL_ENABLED: "false"
    volumes:
      - /opt/pyra/dados/evolution:/evolution/instances
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - saas_net

  # ─── Bot (FastAPI) ────────────────────────────────────────────────────────────

  bot:
    build:
      context: ./academia-saas-bot
    container_name: bot
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ./academia-saas-bot/.env
    environment:
      EVOLUTION_API_URL: http://evolution_api:8080
    depends_on:
      evolution_api:
        condition: service_started
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - saas_net

  # ─── Migrator (roda uma vez e encerra) ────────────────────────────────────────

  migrator:
    build:
      context: ./academia-saas-dashboard
      dockerfile: Dockerfile.migrator
    container_name: db_migrator
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres?schema=public
      DIRECT_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres?schema=public
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - saas_net

  # ─── Dashboard (Next.js) ──────────────────────────────────────────────────────

  web:
    build:
      context: ./academia-saas-dashboard
      dockerfile: Dockerfile.fast
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_BOT_URL: https://api.pyralabs.com.br
    container_name: academia_web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - ./academia-saas-dashboard/.env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres?schema=public
      DIRECT_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres?schema=public
      EVOLUTION_API_URL: http://evolution_api:8080
      BOT_WEBHOOK_URL: http://bot:8000/webhook/evolution
    depends_on:
      bot:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - saas_net

networks:
  saas_net:
    name: saas_net
