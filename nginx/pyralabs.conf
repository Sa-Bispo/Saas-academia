# /etc/nginx/sites-available/pyralabs.conf
# Copiar para: /etc/nginx/sites-available/pyralabs.conf
# Ativar com: sudo ln -s /etc/nginx/sites-available/pyralabs.conf /etc/nginx/sites-enabled/
#
# Após o certbot adicionar SSL, este arquivo será modificado automaticamente.
# Rode: sudo certbot --nginx -d pyralabs.com.br -d www.pyralabs.com.br -d api.pyralabs.com.br

# ─── Dashboard (pyralabs.com.br) ─────────────────────────────────────────────

server {
    listen 80;
    server_name pyralabs.com.br www.pyralabs.com.br;

    # Limite de tamanho de upload (para comprovantes via bot)
    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

# ─── Bot API (api.pyralabs.com.br) ───────────────────────────────────────────

server {
    listen 80;
    server_name api.pyralabs.com.br;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }
}
