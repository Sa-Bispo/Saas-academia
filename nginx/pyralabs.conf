# /etc/nginx/sites-available/pyralabs.conf
# Copiar para: /etc/nginx/sites-available/pyralabs.conf
# Ativar com: sudo ln -s /etc/nginx/sites-available/pyralabs.conf /etc/nginx/sites-enabled/
#
# ESTRUTURA MULTI-NICHO (a partir daqui):
#   pyralabs.com.br            -> hub institucional (estático, pasta pyralabs-hub/)
#   academia.pyralabs.com.br   -> dashboard do nicho academia (porta 3000)
#   api.pyralabs.com.br        -> bot do nicho academia (porta 8000) — MANTIDO DE PROPÓSITO,
#                                  já está em produção com instâncias de WhatsApp conectadas
#                                  nesse webhook. Não renomear, ou as conexões existentes quebram.
#   <novo-nicho>.pyralabs.com.br / <novo-nicho>-api.pyralabs.com.br -> próximos nichos
#     (copie o template no fim deste arquivo quando for ao ar com pizzaria, delivery etc.)
#
# ANTES DE ATIVAR:
#   1. Criar registro DNS tipo A pra "academia" (e, no futuro, pra cada novo nicho)
#      apontando pro IP da VPS, em paralelo ao registro já existente de "api".
#   2. Subir o conteúdo da pasta pyralabs-hub/ em /var/www/pyralabs-hub na VPS.
#   3. Rodar certbot incluindo o novo hostname:
#      sudo certbot --nginx -d pyralabs.com.br -d www.pyralabs.com.br \
#        -d academia.pyralabs.com.br -d api.pyralabs.com.br
#   4. sudo nginx -t && sudo systemctl reload nginx

# ─── Hub institucional (pyralabs.com.br) ─────────────────────────────────────

server {
    listen 80;
    server_name pyralabs.com.br www.pyralabs.com.br;

    root /var/www/pyralabs-hub;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ─── Dashboard do nicho academia (academia.pyralabs.com.br) ──────────────────

server {
    listen 80;
    server_name academia.pyralabs.com.br;

    # Limite de tamanho de upload (para comprovantes via bot)
    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

# ─── Bot API do nicho academia (api.pyralabs.com.br) ─────────────────────────
# Não renomeado: já tem instância(s) de WhatsApp em produção com webhook
# configurado nesse host. Renomear aqui exige reconectar o número no painel.

server {
    listen 80;
    server_name api.pyralabs.com.br;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }
}

