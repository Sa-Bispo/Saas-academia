services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.fast
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: whatsapp_saas_web
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: always
    networks:
      - default
      - saas_network

networks:
  default:
  saas_network:
    external: true
